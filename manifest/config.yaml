name: wormhole-core
version: 1.0.0
description: Universal L4 transport tunnel over QUIC with end-to-end mTLS

capabilities:
  - id: MultiProtocolTransport
    description: Transparently tunnels TCP and UDP streams through a QUIC conduit
    protocols:
      - tcp
      - udp

alpn:
  - wormhole/3
  - h3

routing:
  strategy: sni-passthrough
  description: >
    The relay routes incoming connections to the correct QUIC tunnel
    based on SNI or Connection ID. Initial packets are peeked for SNI routing,
    while application payloads remain E2E encrypted.
  affinity:
    # Gateway Steering: the Tachyon gateway pins each SNI/Connection-ID to the
    # specific worker instance holding the in-memory DashMap routing table.
    mode: l4-sticky
    key: sni            # primary key: TLS SNI hostname
    fallback: quic-cid  # secondary key: QUIC Connection ID

components:
  relay:
    language: rust
    # Current wasm32-wasip1 support is a placeholder for future Tachyon host
    # bindings. Native QUIC socket runtime is cfg-gated out on wasm32 today.
    target: wasm32-wasip1
    target_status: placeholder
    package: faas
    entrypoint: faas/src/main.rs
    execution_mode: worker  # long-lived process; tokio keeps QUIC connections alive

  client:
    language: nodejs
    package: cli
    entrypoint: cli/src/index.js
    bin: wormhole

tachyon:
  mesh: true
  faas: true
  region: edge
  gateway:
    steering: affinity
    protocol: l4
  virtual_socket:
    # The relay must accept sockets from Tachyon's Virtual Socket Layer
    # (accelerator-host.wit) rather than binding OS UDP sockets directly.
    enabled: true
    wit: accelerator-host
