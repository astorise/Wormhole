name: CI — Rust FaaS

on:
  push:
    branches: [main]
    paths:
      - 'faas/**'
      - '.github/workflows/ci-faas.yml'
  pull_request:
    paths:
      - 'faas/**'
      - '.github/workflows/ci-faas.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: faas

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            faas/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('faas/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint (clippy)
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test --verbose

  build-wasm:
    name: Build → wasm32-wasi
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: faas

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + wasm32-wasi target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasi

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            faas/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('faas/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Build Wasm
        run: cargo build --release --target wasm32-wasi

      - name: Upload Wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: wormhole-relay.wasm
          path: faas/target/wasm32-wasi/release/*.wasm
          if-no-files-found: error
