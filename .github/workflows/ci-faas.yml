name: CI — Rust FaaS

on:
  push:
    branches: [main]
    paths:
      - 'faas/**'
      - '.github/workflows/ci-faas.yml'
  pull_request:
    paths:
      - 'faas/**'
      - '.github/workflows/ci-faas.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (native)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: faas

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            faas/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('faas/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint (clippy)
        # Run clippy on the native target, not wasm
        run: cargo clippy --all-targets -- -D warnings

      - name: Audit dependencies
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: faas

      - name: Run tests
        run: cargo test --verbose

  build-wasm:
    name: Build → wasm32-wasip1
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: faas

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + wasm32-wasip1 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            faas/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('faas/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Build Wasm
        # Native QUIC sockets are cfg-gated out until Tachyon Virtual Socket
        # Layer replaces OS sockets; this still enforces a valid Wasm entrypoint.
        run: cargo build --release --target wasm32-wasip1

      - name: Upload Wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: wormhole-relay.wasm
          path: faas/target/wasm32-wasip1/release/*.wasm
          if-no-files-found: warn
